<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket 테스트 (JWT 인증)</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .input-group {
            margin: 10px 0;
        }
        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }
        input[type="text"] {
            padding: 8px;
            width: 500px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }
        #messages p {
            margin: 5px 0;
            padding: 8px;
            background-color: white;
            border-radius: 4px;
            border-left: 3px solid #4CAF50;
        }
        .connected {
            color: green;
            font-weight: bold;
        }
        .disconnected {
            color: red;
            font-weight: bold;
        }
        .info-box {
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .info-box h3 {
            margin-top: 0;
        }
    </style>
</head>
<body>
<h1>WebSocket + STOMP 테스트 (JWT 인증)</h1>

<!-- 사용 안내 -->
<div class="info-box">
    <h3>사용 방법</h3>
    <ol>
        <li>먼저 로그인하여 JWT 토큰을 받으세요</li>
        <li>받은 JWT 토큰을 아래 입력창에 붙여넣으세요 (Bearer 제외)</li>
        <li>"연결" 버튼을 클릭하세요</li>
        <li>메시지를 입력하고 전송하세요</li>
    </ol>
    <p><strong>토큰 얻는 방법:</strong></p>
    <ul>
        <li>Swagger UI에서 로그인 → 응답에서 accessToken 복사</li>
        <li>Postman에서 로그인 API 호출 → accessToken 복사</li>
    </ul>
</div>

<div>
    <span id="status" class="disconnected">● 연결 안됨</span>
</div>

<!-- JWT 토큰 입력 -->
<div class="input-group">
    <label for="jwtToken">JWT 토큰:</label>
    <input type="text" id="jwtToken" placeholder="여기에 JWT 토큰을 붙여넣으세요 (Bearer 제외)">
</div>

<div>
    <button id="connectBtn" onclick="connect()">연결</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled>연결 해제</button>
    <button onclick="clearMessages()">메시지 지우기</button>
</div>

<!-- 메시지 입력 -->
<div class="input-group">
    <label for="message">메시지:</label>
    <input type="text" id="message" placeholder="메시지를 입력하세요" disabled>
    <button id="sendBtn" onclick="sendMessage()" disabled>전송</button>
</div>

<div>
    <h3>받은 메시지:</h3>
    <div id="messages"></div>
</div>

<script>
    let stompClient = null;
    let connected = false;

    function connect() {
        if (connected) {
            alert('이미 연결되어 있습니다!');
            return;
        }

        // JWT 토큰 가져오기
        const token = document.getElementById('jwtToken').value.trim();
        if (!token) {
            alert('JWT 토큰을 입력해주세요!');
            return;
        }

        const socket = new SockJS('http://localhost:8080/ws-stomp');
        stompClient = Stomp.over(socket);

        // STOMP 연결 시 JWT 토큰을 헤더에 포함
        const headers = {
            'Authorization': 'Bearer ' + token
        };

        stompClient.connect(headers, function (frame) {
            console.log('Connected: ' + frame);
            connected = true;
            updateUI(true);

            // /topic/test 구독
            stompClient.subscribe('/topic/test', function (message) {
                const data = JSON.parse(message.body);
                showMessage(data.content, data.senderId, data.senderName);
            });

            alert('연결 성공!');
        }, function(error) {
            console.error('Connection error: ', error);
            connected = false;
            updateUI(false);

            // 에러 메시지 분석
            if (error.toString().includes('401') || error.toString().includes('403')) {
                alert('인증 실패: JWT 토큰이 유효하지 않습니다.');
            } else {
                alert('연결 실패: ' + error);
            }
        });
    }

    function disconnect() {
        if (stompClient !== null && connected) {
            stompClient.disconnect(function() {
                console.log("Disconnected");
                connected = false;
                updateUI(false);
                alert('연결 해제!');
            });
        }
    }

    function sendMessage() {
        if (!connected) {
            alert('먼저 연결해주세요!');
            return;
        }

        const content = document.getElementById('message').value;
        if (!content) {
            alert('메시지를 입력하세요!');
            return;
        }

        stompClient.send("/app/chat.test", {}, JSON.stringify({
            'content': content
        }));
        document.getElementById('message').value = '';
    }

    function showMessage(message, senderId, senderName) {
        const messagesDiv = document.getElementById('messages');
        const p = document.createElement('p');
        const now = new Date().toLocaleTimeString();

        // 발신자 이름 포함
        p.textContent = `[${now}] ${senderName} (ID: ${senderId}): ${message}`;
        messagesDiv.appendChild(p);

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function clearMessages() {
        document.getElementById('messages').innerHTML = '';
    }

    function updateUI(isConnected) {
        const status = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('message');
        const tokenInput = document.getElementById('jwtToken');

        if (isConnected) {
            status.textContent = '● 연결됨';
            status.className = 'connected';
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            tokenInput.disabled = true;  // 연결 후 토큰 수정 불가
        } else {
            status.textContent = '● 연결 안됨';
            status.className = 'disconnected';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;
            tokenInput.disabled = false;
        }
    }

    window.addEventListener('beforeunload', function() {
        if (connected && stompClient !== null) {
            stompClient.disconnect();
        }
    });
</script>
</body>
</html>
