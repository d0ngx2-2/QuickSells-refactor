spring:
  application:
    name: QuickSells

  config:
    import: optional:file:.env[.env]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    show-sql: true

jwt:
  secret:
    key: ${JWT_SECRET_KEY}