spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3307/quicksells?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 5MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            authorization-grant-type: authorization_code
            client-name: Google
            scope:
              - profile
              - email

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_EMAIL}
    password: ${GOOGLE_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

frontend:
  redirect-url: ${FRONTEND_REDIRECT_URL:http://localhost:5173}

backend:
  server-name: ${BACKEND_SERVER_NAME:localhost}

jwt:
  secret:
    key: ${JWT_SECRET_KEY:test123test123test123test123test123test123test123test123test123test123}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:dummy-access-key}
      secret-key: ${AWS_SECRET_KEY:dummy-secret-key}
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:dummy-bucket}
    stack:
      auto: false

toss:
  payments:
    base-url: https://api.tosspayments.com
    client-key: ${TOSS_CLIENT_KEY:dummy-client-key}
    secret-key: ${TOSS_SECRET_KEY:dummy-secret-key}

management:
  health:
    mail:
      enabled: false