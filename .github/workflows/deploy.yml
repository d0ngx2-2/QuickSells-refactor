name: CI/CD Pipeline - Host Level Blue-Green

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EC2 (Internal Blue-Green)
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      HOST_A: ${{ secrets.EC2_HOST }}
      HOST_B: ${{ secrets.EC2_HOST2 }}

    strategy:
      matrix:
        host_key: [HOST_A, HOST_B]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.host_key == 'HOST_A' && env.HOST_A || env.HOST_B }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🔎 현재 가동 중인 컨테이너 확인"
            if [ "$(docker ps -q -f name=quicksells-blue)" ]; then
              TARGET=green
              ACTIVE=blue
              TARGET_PORT=8082
              OLD_PORT=8081
            else
              TARGET=blue
              ACTIVE=green
              TARGET_PORT=8081
              OLD_PORT=8082
            fi

            echo "배포 전략: $ACTIVE(기존) -> $TARGET(신규)"

            echo "ECR 로그인"
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            echo "새 이미지 Pull: ${{ env.IMAGE_TAG }}"
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            echo "기존 $TARGET 컨테이너 제거"
            docker rm -f quicksells-$TARGET 2>/dev/null || true

            echo "로그 디렉토리 권한 설정"
            sudo mkdir -p /home/ubuntu/logs
            sudo chown -R ubuntu:ubuntu /home/ubuntu/logs

            echo "$TARGET 컨테이너 실행 (Port: $TARGET_PORT)"
            docker run -d \
              --name quicksells-$TARGET \
              --add-host=host.docker.internal:host-gateway \
              -p $TARGET_PORT:8080 \
              --restart always \
              -v /home/ubuntu/logs:/home/ubuntu/logs \
              -e SPRING_DATA_REDIS_HOST=host.docker.internal \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e GOOGLE_EMAIL="${{ secrets.GOOGLE_EMAIL }}" \
              -e GOOGLE_APP_PASSWORD="${{ secrets.GOOGLE_APP_PASSWORD }}" \
              -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              -e AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
              -e AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
              -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
              -e TOSS_CLIENT_KEY="${{ secrets.TOSS_CLIENT_KEY }}" \
              -e TOSS_SECRET_KEY="${{ secrets.TOSS_SECRET_KEY }}" \
              -e LOGGING_FILE_PATH="/home/ubuntu/logs/quicksells.log" \
              -e PROMETHEUS_PATH="/actuator/prometheus" \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            echo "헬스 체크 중... (Target Port: $TARGET_PORT)"
            for i in {1..15}; do
              sleep 5
              if curl -s http://localhost:$TARGET_PORT/actuator/health | grep "UP"; then
                echo "헬스 체크 성공!"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "헬스 체크 실패. 배포를 중단합니다."
                docker stop quicksells-$TARGET
                exit 1
              fi
            done

            echo "Nginx 리버스 프록시 전환 ($OLD_PORT -> $TARGET_PORT)"
            sudo sed -i "s/127.0.0.1:$OLD_PORT/127.0.0.1:$TARGET_PORT/" /etc/nginx/conf.d/service.conf
            
            sudo nginx -t && sudo nginx -s reload

            echo "구버전 ($ACTIVE) 컨테이너 정리 (10초 대기)"
            sleep 10
            docker rm -f quicksells-$ACTIVE 2>/dev/null || true

            echo "배포 완료!"